name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true # don't block on lint warnings yet

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js doesn't fail on missing required env at build time.
          # Real values live in Heroku Config Vars (production) or .env (local).
          NEXTAUTH_SECRET: ci-dummy-secret-not-used-at-runtime
          NEXTAUTH_URL: https://example.com
